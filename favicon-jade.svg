<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#f0ede8"/>
  <g transform="translate(4, 5) scale(0.87)">
  <!-- pot -->
  <rect x="20" y="48" width="24" height="10" rx="3" fill="#e4dfd8"/>
  <rect x="20" y="48" width="24" height="2" fill="#d4cfc8"/>
  <rect x="20" y="51" width="24" height="1.5" fill="#d4cfc8"/>
  <ellipse cx="32" cy="58" rx="12" ry="3" fill="#d4cfc8"/>
  <!-- white pebbles - back row -->
  <ellipse cx="24" cy="46" rx="3.5" ry="2" fill="#eeecea"/>
  <ellipse cx="31" cy="45" rx="3.5" ry="2" fill="#f4f4f2"/>
  <ellipse cx="38" cy="46" rx="3.5" ry="2" fill="#eeecea"/>
  <!-- white pebbles - front row covering trunk base -->
