  <!-- branches -->
  <line x1="32" y1="34" x2="20" y2="24" stroke="#7a5c3a" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="44" y2="22" stroke="#7a5c3a" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="30" x2="32" y2="18" stroke="#7a5c3a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="20" y1="24" x2="12" y2="14" stroke="#6a4e30" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="24" x2="24" y2="13" stroke="#6a4e30" stroke-width="2" stroke-linecap="round"/>
  <line x1="44" y1="22" x2="52" y2="13" stroke="#6a4e30" stroke-width="2" stroke-linecap="round"/>
  <line x1="44" y1="22" x2="40" y2="12" stroke="#6a4e30" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="22" x2="26" y2="12" stroke="#6a4e30" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="21" x2="38" y2="11" stroke="#6a4e30" stroke-width="2" stroke-linecap="round"/>
  <!-- leaves -->
  <ellipse cx="9" cy="12" rx="7" ry="5" fill="#246020" transform="rotate(-30,9,12)"/>
  <ellipse cx="14" cy="7" rx="6" ry="4.5" fill="#2d7228" transform="rotate(-15,14,7)"/>
  <ellipse cx="21" cy="10" rx="6" ry="4.5" fill="#246020" transform="rotate(-40,21,10)"/>
  <ellipse cx="26" cy="5" rx="6" ry="4" fill="#2d7228" transform="rotate(-10,26,5)"/>
  <ellipse cx="32" cy="14" rx="6" ry="4.5" fill="#246020"/>
  <ellipse cx="32" cy="8" rx="6" ry="4" fill="#287025"/>
  <ellipse cx="27" cy="4" rx="6" ry="4" fill="#246020" transform="rotate(-15,27,4)"/>
  <ellipse cx="37" cy="4" rx="6" ry="4" fill="#2d7228" transform="rotate(15,37,4)"/>
  <ellipse cx="38" cy="11" rx="6" ry="4.5" fill="#287025" transform="rotate(20,38,11)"/>
  <ellipse cx="44" cy="7" rx="6" ry="4.5" fill="#246020" transform="rotate(10,44,7)"/>
  <ellipse cx="51" cy="11" rx="6" ry="4.5" fill="#2d7228" transform="rotate(35,51,11)"/>
  <ellipse cx="55" cy="5" rx="6" ry="4" fill="#246020" transform="rotate(20,55,5)"/>
  <!-- pebbles on top of trunk base -->
  <ellipse cx="29" cy="47" rx="3.2" ry="2" fill="#f0f0ee"/>
  <ellipse cx="35" cy="47" rx="3.2" ry="2" fill="#eeecea"/>
  <!-- highlights -->
  <ellipse cx="9" cy="11" rx="2" ry="1.2" fill="#3c9035" opacity="0.4" transform="rotate(-30,9,11)"/>
  <ellipse cx="32" cy="13" rx="2" ry="1.2" fill="#3c9035" opacity="0.35"/>  </g>
